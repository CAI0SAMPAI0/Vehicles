<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDrive - Encontre seu carro perfeito</title>
    <link rel="icon" type="image/png" href="/autodrive_logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/src/index.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <a href="index.html" class="nav-logo">Auto<span>Drive</span></a>
        <ul id="auth-container" class="nav-links">
            <li class="nav-greeting">Olá, Admin!</li>
            <li class="nav-btn-red"><a href="../new_car/">+ Cadastrar</a></li>
            <li><a href="index.html">Garagem</a></li>
            <li><a href="../login/">Sair</a></li>
        </ul>
    </nav>

    <main>
        <div class="search-strip">
            <div class="search-inner">
                <div class="search-label">Encontre seu carro</div>
                <div style="flex:1; display:flex; gap: 0.75rem; flex-wrap: wrap;">
                    <div class="search-bar" style="flex:1; max-width:380px;">
                        <input type="text" id="search-input" placeholder="Modelo, marca...">
                        <button type="button" id="search-btn">Buscar</button>
                    </div>
                    <select id="brand-filter" class="filter-select">
                        <option value="">Todas as marcas</option>
                    </select>
                    <select id="category-filter" class="filter-select">
                        <option value="">Todas as categorias</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="cars-section">
            <div id="cars-meta" class="cars-meta">0 veículos encontrados</div>
            <div id="cars-grid" class="car-grid">
                <!-- Carregado dinamicamente via TypeScript -->
            </div>
            <div class="load-more-container" style="display: flex; justify-content: center; margin-top: 3rem;">
                <button id="load-more-btn" class="btn btn-ghost" style="display: none;">Carregar mais veículos</button>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="footer-logo">Auto<span>Drive</span></div>
        <p>&copy; 2026 Caio Sampaio &mdash; Todos os direitos reservados</p>
    </footer>

    <!-- Scripts -->
    <script type="module" src="/src/cars.ts"></script>



</body>

</html>
