name: Deploy Backend to Hugging Face

on:
  push:
    branches:
      - main
    # Opcional: Apenas dispara se houver alterações no backend, no Dockerfile ou nas configurações
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'README.md'
      - '.github/workflows/deploy_hf.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para empurrar o histórico do git completo
          lfs: true

      - name: Setup Git LFS
        run: |
          git lfs install

      - name: Prepare Clean Backend Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Cria uma branch órfã temporária sem histórico de commits
          git checkout --orphan temp-deploy-branch
          
          # 2. Remove o rastreamento do index
          git rm -r --cached frontend/ || true
          git rm -r --cached cars/ || true
          git rm -r --cached .venv/ || true
          
          # Exclui fisicamente
          rm -rf frontend/ cars/ .venv/

      - name: Commit and Renormalize
        run: |
          # 3. Força a re-normalização de todas as imagens restantes para LFS
          git add --renormalize .
          git add -A
          git commit -m "Deploy: Django Backend (Clean single-commit LFS deploy)"

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Envia forçado para o branch main do space na Hugging Face
          git push https://caio007:$HF_TOKEN@huggingface.co/spaces/caio007/vehicles HEAD:refs/heads/main --force
