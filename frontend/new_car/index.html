<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDrive - Cadastrar Carro</title>
    <link rel="icon" type="image/png" href="/autodrive_logo.png?v=2">
    <link rel="manifest" href="/manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/src/index.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <a href="../cars/" class="nav-logo">Auto<span>Drive</span></a>
        <ul class="nav-links">
            <li><a href="../cars/">Garagem</a></li>
            <li><a href="../login/">Sair</a></li>
        </ul>
    </nav>

    <!-- CONTENT -->
    <main style="padding: 2rem 1rem; display: flex; justify-content: center; align-items: center;">
        <div style="max-width: 700px; width: 100%; margin: 2rem auto;">
            <button id="btn-back-top" onclick="window.history.back()" style="display: inline-flex; align-items: center; gap: 0.5rem; background: none; border: none; color: var(--text-dim); font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; padding: 0.4rem 0; margin-bottom: 1rem; transition: color 0.2s;" onmouseover="this.style.color='var(--text-hi)'" onmouseout="this.style.color='var(--text-dim)'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                Voltar
            </button>
        <div class="form-card">
            <h2 id="page-title">Cadastrar Veículo</h2>
            <p id="page-subtitle" class="form-subtitle">Adicione um novo carro ao inventário</p>
            
            <form id="car-form" enctype="multipart/form-data">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label for="model">Modelo</label>
                        <input type="text" id="model" name="model" required placeholder="Ex: Civic">
                    </div>
                    <div class="form-group">
                        <label for="brand">Marca</label>
                        <select id="brand" name="brand" required>
                            <option value="" class="bg-brand-panel">Selecione uma marca</option>
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label for="factory_year">Ano de Fabricação</label>
                        <input type="number" id="factory_year" name="factory_year" placeholder="Ex: 2020">
                    </div>
                    <div class="form-group">
                        <label for="model_year">Ano do Modelo</label>
                        <input type="number" id="model_year" name="model_year" placeholder="Ex: 2021">
                    </div>
                    <div class="form-group">
                        <label for="plate">Placa</label>
                        <input type="text" id="plate" name="plate" placeholder="Ex: ABC-1234">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label id="value-label" for="value">Valor</label>
                        <div style="display: flex; gap: 0.5rem; align-items: center; width: 100%;">
                            <select id="currency" name="currency" style="background: var(--dark); border: 1px solid var(--border); color: var(--text-hi); padding: 0.75rem; border-radius: 6px; font-family: inherit; font-size: 0.9rem; width: 95px; outline: none; cursor: pointer; transition: border-color 0.3s ease;">
                                <option value="BRL" selected>BRL (R$)</option>
                                <option value="USD">USD ($)</option>
                            </select>
                            <input type="text" id="value" name="value" placeholder="Ex: 85.000,00" style="flex: 1; margin: 0;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="photo">Foto</label>
                        <input type="file" id="photo" name="photo" accept="image/*" style="padding: 0.5rem 1rem;">
                        <div id="photo-preview-container" style="margin-top: 1rem; display: none; text-align: left;">
                            <span style="display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 0.72rem; color: var(--text-dim); margin-bottom: 0.5rem; text-transform: uppercase;">Foto Atual</span>
                            <img id="photo-preview" src="" alt="Foto atual" style="max-height: 120px; border-radius: 4px; border: 1px solid var(--border); object-fit: cover; display: block;">
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="bio">Descrição / Bio</label>
                    <textarea id="bio" name="bio" placeholder="Descreva os detalhes do automóvel..."></textarea>
                </div>

                <div class="form-actions" style="display: flex; gap: 1rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary" id="btn-save-car" style="flex: 1; justify-content: center;">Salvar Alterações</button>
                    <button type="button" id="btn-cancel" class="btn btn-ghost" style="flex: 1; justify-content: center; text-align: center;">Cancelar</button>
                </div>
            </form>
        </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="footer-logo">Auto<span>Drive</span></div>
        <p>&copy; 2026 Caio Sampaio &mdash; Todos os direitos reservados</p>
    </footer>

    <!-- Scripts -->
    <script type="module" src="/src/new_car.ts"></script>

</body>
</html>
