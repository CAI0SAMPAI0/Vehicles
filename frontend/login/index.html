<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDrive - Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/src/index.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <a href="../cars/" class="nav-logo">Auto<span>Drive</span></a>
        <ul class="nav-links">
            <li><a href="../cars/">Garagem</a></li>
            <li><a href="../register/">Cadastre-se</a></li>
        </ul>
    </nav>

    <!-- FORM CARD -->
    <main style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 128px); padding: 2rem 1rem;">
        <div class="form-card" style="margin: 0; width: 100%;">
            <h2>Entrar</h2>
            <p class="form-subtitle">Acesse sua conta para gerenciar carros</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group" style="position: relative;">
                    <label for="password">Senha</label>
                    <div style="position: relative;">
                        <input type="password" id="password" name="password" required style="padding-right: 3rem;">
                        <button type="button" id="toggle-password" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: transparent; border: none; cursor: pointer; color: var(--text-dim);">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 20px; height: 20px;">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.85rem;">
                    Entrar
                </button>
            </form>
            
            <p style="font-size: 0.8rem; color: var(--text-dim); text-align: center; margin-top: 1.5rem;">
                Não tem uma conta? <a href="../register/" style="color: var(--red); text-decoration: none;">Cadastre-se</a>
            </p>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="footer-logo">Auto<span>Drive</span></div>
        <p>&copy; 2026 Caio Sampaio &mdash; Todos os direitos reservados</p>
    </footer>

    <!-- Scripts -->
    <script type="module" src="/src/auth.ts"></script>

</body>
</html>
