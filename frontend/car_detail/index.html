<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDrive - Detalhes do Carro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/src/index.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <a href="../cars/" class="nav-logo">Auto<span>Drive</span></a>
        <ul class="nav-links">
            <li><a href="../cars/">Garagem</a></li>
            <li><a href="../login/">Sair</a></li>
        </ul>
    </nav>

    <!-- CONTENT -->
    <main>
        <a href="../cars/" class="back-link">
            ← Voltar à garagem
        </a>
        
        <div class="detail-wrapper anim-fadeup">
            <!-- Left Side: Photo -->
            <div id="car-photo-container" class="detail-photo">
                <div class="no-photo-lg">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <rect x="1" y="6" width="22" height="13" rx="2"/><path d="M5 6l2-3h10l2 3"/><circle cx="7.5" cy="13" r="1.5"/><circle cx="16.5" cy="13" r="1.5"/>
                    </svg>
                    <span>Foto não disponível</span>
                </div>
            </div>
            
            <!-- Right Side: Panel -->
            <div class="detail-panel">
                <div class="detail-header">
                    <div id="car-brand-tag" class="detail-brand">MARCA</div>
                    <div id="car-model-title" class="detail-model">Modelo do Carro</div>
                    <div id="car-value-display" class="detail-price">R$ 0,00</div>
                </div>
                
                <div class="specs-card">
                    <div class="specs-title">Especificações</div>
                    <div class="spec-row">
                        <span class="spec-label">Ano de Fabricação</span>
                        <span id="spec-factory-year" class="spec-value">-</span>
                    </div>
                    <div class="spec-row">
                        <span class="spec-label">Ano do Modelo</span>
                        <span id="spec-model-year" class="spec-value">-</span>
                    </div>
                    <div class="spec-row">
                        <span class="spec-label">Placa</span>
                        <span id="spec-plate" class="spec-value">-</span>
                    </div>
                </div>
                
                <div id="car-bio-card" class="bio-card" style="display: none;">
                    <div class="bio-title">Descrição</div>
                    <p id="car-bio" class="bio-text"></p>
                </div>
                
                <div class="detail-actions" id="detail-actions" style="display: none;">
                    <button id="btn-edit" class="btn btn-primary">Editar veículo</button>
                    <button id="btn-delete" class="btn btn-danger">Remover</button>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="footer-logo">Auto<span>Drive</span></div>
        <p>&copy; 2026 Caio Sampaio &mdash; Todos os direitos reservados</p>
    </footer>

    <!-- Scripts -->
    <script type="module" src="/src/car_detail.ts"></script>

</body>
</html>
